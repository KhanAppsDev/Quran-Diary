<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Diary</title>
  <style>
    :root {
      --bg: #f6f7f3;
      --surface: #ffffff;
      --text: #172018;
      --muted: #5f6d61;
      --line: #dde3db;
      --accent: #0b5f3b;
      --dark-green: #0f5132;
      --shadow: 0 8px 22px rgba(18, 39, 24, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .hidden { display: none !important; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246,247,243,0.95);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--line);
      padding: 0.85rem 1rem;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
    }

    h1 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .overall {
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 1rem;
    }

    .login {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 1rem;
    }

    .login .card {
      width: min(100%, 380px);
      padding: 1.2rem;
    }

    label {
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: block;
    }

    input {
      width: 100%;
      padding: 0.78rem 0.85rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 1rem;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 0.72rem 0.9rem;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .primary { background: var(--accent); color: #fff; }
    .secondary { background: #e9efe8; color: #203625; }
    .danger { background: #fbe7e7; color: #8d1e1e; }

    .login button { width: 100%; margin-top: 0.9rem; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 0.65rem;
      margin-bottom: 1rem;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.68rem;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 0.15rem;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.72rem;
      margin-bottom: 1.25rem;
    }

    .surah-tile {
      border: 1px solid #d9e2d3;
      border-radius: 12px;
      padding: 0.65rem;
      min-height: 102px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 120ms ease;
    }

    .surah-tile:active { transform: scale(0.986); }

    .surah-top {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .surah-name {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .surah-num {
      color: var(--muted);
      font-size: 0.76rem;
    }

    .tile-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.75rem;
      gap: 0.35rem;
    }

    .tile-actions span {
      font-size: 0.82rem;
      font-weight: 700;
    }

    .clear-wrap { padding-bottom: 0.9rem; }

    dialog {
      border: 1px solid var(--line);
      border-radius: 14px;
      width: min(96vw, 780px);
      max-height: 88vh;
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop { background: rgba(18, 32, 19, 0.45); }

    .modal-header {
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
      border-bottom: 1px solid var(--line);
      padding: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0.85rem;
      border-bottom: 1px solid var(--line);
    }

    .ayah-list {
      max-height: 62vh;
      overflow: auto;
      padding: 0.5rem 0.85rem 0.9rem;
      background: #fdfefd;
    }

    .ayah-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.58rem;
      margin-top: 0.45rem;
      background: #fff;
      display: flex;
      gap: 0.65rem;
      align-items: flex-start;
    }

    .ayah-item input { width: auto; margin-top: 0.2rem; }

    .ayah-text {
      margin: 0;
      font-size: 1.02rem;
      line-height: 1.9;
      direction: rtl;
      text-align: right;
    }

    .ayah-label {
      color: var(--muted);
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
    }

    .modal-footer {
      border-top: 1px solid var(--line);
      padding: 0.75rem;
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      position: sticky;
      bottom: 0;
      background: #fff;
    }

    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .stats .stat:last-child { grid-column: 1/-1; }
      .grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
  </style>
</head>
<body>
  <section id="loginScreen" class="login">
    <div class="card">
      <h2 style="margin:0 0 .25rem;">Quran Diary</h2>
      <p style="margin:0 0 1rem; color:#5f6d61;">Enter your first name to begin.</p>
      <label for="firstName">First name</label>
      <input id="firstName" maxlength="32" placeholder="e.g. Maryam" autocomplete="given-name" />
      <button id="saveNameBtn" class="primary">Start</button>
    </div>
  </section>

  <main id="appScreen" class="hidden">
    <header class="app-header">
      <div class="title-row">
        <h1 id="appTitle"></h1>
        <div id="overallHeader" class="overall"></div>
      </div>
    </header>

    <div class="container">
      <section class="stats" id="stats"></section>
      <section class="grid" id="surahGrid"></section>
      <div class="clear-wrap">
        <button id="clearDataBtn" class="danger">Clear app local data</button>
      </div>
    </div>
  </main>

  <dialog id="surahDialog">
    <div class="modal-header">
      <strong id="modalTitle">Surah</strong>
      <button id="closeModalBtn" class="secondary" style="padding:.45rem .7rem">Close</button>
    </div>

    <div class="modal-actions">
      <button id="diveInBtn" class="primary">Dive in</button>
      <button id="markCompleteBtn" class="secondary">Mark complete</button>
      <span id="modalPercent" style="margin-left:auto;align-self:center;font-size:.85rem;color:#5f6d61;"></span>
    </div>

    <div id="ayahList" class="ayah-list hidden"></div>

    <div id="modalFooter" class="modal-footer hidden">
      <button id="prevSurahBtn" class="secondary">Previous Surah</button>
      <button id="nextSurahBtn" class="secondary">Next Surah</button>
    </div>
  </dialog>

  <script>
    const TOTAL_AYAHS = 6236;
    const STORAGE_KEY = "quranDiary.v1";

    const SURAHS = [
      ["Al-Fatihah",7],["Al-Baqarah",286],["Ali 'Imran",200],["An-Nisa",176],["Al-Ma'idah",120],["Al-An'am",165],["Al-A'raf",206],["Al-Anfal",75],["At-Tawbah",129],["Yunus",109],["Hud",123],["Yusuf",111],["Ar-Ra'd",43],["Ibrahim",52],["Al-Hijr",99],["An-Nahl",128],["Al-Isra",111],["Al-Kahf",110],["Maryam",98],["Ta-Ha",135],["Al-Anbiya",112],["Al-Hajj",78],["Al-Mu'minun",118],["An-Nur",64],["Al-Furqan",77],["Ash-Shu'ara",227],["An-Naml",93],["Al-Qasas",88],["Al-Ankabut",69],["Ar-Rum",60],["Luqman",34],["As-Sajdah",30],["Al-Ahzab",73],["Saba",54],["Fatir",45],["Ya-Sin",83],["As-Saffat",182],["Sad",88],["Az-Zumar",75],["Ghafir",85],["Fussilat",54],["Ash-Shura",53],["Az-Zukhruf",89],["Ad-Dukhan",59],["Al-Jathiyah",37],["Al-Ahqaf",35],["Muhammad",38],["Al-Fath",29],["Al-Hujurat",18],["Qaf",45],["Adh-Dhariyat",60],["At-Tur",49],["An-Najm",62],["Al-Qamar",55],["Ar-Rahman",78],["Al-Waqi'ah",96],["Al-Hadid",29],["Al-Mujadila",22],["Al-Hashr",24],["Al-Mumtahanah",13],["As-Saff",14],["Al-Jumu'ah",11],["Al-Munafiqun",11],["At-Taghabun",18],["At-Talaq",12],["At-Tahrim",12],["Al-Mulk",30],["Al-Qalam",52],["Al-Haqqah",52],["Al-Ma'arij",44],["Nuh",28],["Al-Jinn",28],["Al-Muzzammil",20],["Al-Muddaththir",56],["Al-Qiyamah",40],["Al-Insan",31],["Al-Mursalat",50],["An-Naba",40],["An-Nazi'at",46],["Abasa",42],["At-Takwir",29],["Al-Infitar",19],["Al-Mutaffifin",36],["Al-Inshiqaq",25],["Al-Buruj",22],["At-Tariq",17],["Al-A'la",19],["Al-Ghashiyah",26],["Al-Fajr",30],["Al-Balad",20],["Ash-Shams",15],["Al-Layl",21],["Ad-Duha",11],["Ash-Sharh",8],["At-Tin",8],["Al-'Alaq",19],["Al-Qadr",5],["Al-Bayyinah",8],["Az-Zalzalah",8],["Al-'Adiyat",11],["Al-Qari'ah",11],["At-Takathur",8],["Al-'Asr",3],["Al-Humazah",9],["Al-Fil",5],["Quraysh",4],["Al-Ma'un",7],["Al-Kawthar",3],["Al-Kafirun",6],["An-Nasr",3],["Al-Masad",5],["Al-Ikhlas",4],["Al-Falaq",5],["An-Nas",6]
    ];

    const loginScreen = document.getElementById("loginScreen");
    const appScreen = document.getElementById("appScreen");
    const saveNameBtn = document.getElementById("saveNameBtn");
    const firstNameInput = document.getElementById("firstName");
    const appTitle = document.getElementById("appTitle");
    const overallHeader = document.getElementById("overallHeader");
    const statsEl = document.getElementById("stats");
    const surahGrid = document.getElementById("surahGrid");
    const clearDataBtn = document.getElementById("clearDataBtn");

    const surahDialog = document.getElementById("surahDialog");
    const modalTitle = document.getElementById("modalTitle");
    const modalPercent = document.getElementById("modalPercent");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const diveInBtn = document.getElementById("diveInBtn");
    const markCompleteBtn = document.getElementById("markCompleteBtn");
    const ayahListEl = document.getElementById("ayahList");
    const modalFooter = document.getElementById("modalFooter");
    const prevSurahBtn = document.getElementById("prevSurahBtn");
    const nextSurahBtn = document.getElementById("nextSurahBtn");

    let state = loadState();
    let activeSurahIndex = null;
    let surahCache = {};

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { firstName: "", memorized: {} };
      try {
        const parsed = JSON.parse(raw);
        return {
          firstName: parsed.firstName || "",
          memorized: parsed.memorized || {}
        };
      } catch {
        return { firstName: "", memorized: {} };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getMemorizedSet(surahNumber) {
      const key = String(surahNumber);
      const arr = state.memorized[key] || [];
      return new Set(arr);
    }

    function setMemorizedSet(surahNumber, setObj) {
      state.memorized[String(surahNumber)] = [...setObj].sort((a,b)=>a-b);
      saveState();
    }

    function setSurahComplete(surahNumber, ayahCount, complete=true) {
      const next = new Set();
      if (complete) {
        for (let i = 1; i <= ayahCount; i += 1) next.add(i);
      }
      setMemorizedSet(surahNumber, next);
    }

    function surahPercent(index) {
      const surahNumber = index + 1;
      const ayahCount = SURAHS[index][1];
      const memorized = getMemorizedSet(surahNumber).size;
      return Math.round((memorized / ayahCount) * 100);
    }

    function colorForPercent(percent) {
      if (percent === 0) return "#f0f2ef";
      if (percent < 25) return "#f8e47f";
      if (percent < 50) return "#d9e88e";
      if (percent < 75) return "#9fd37c";
      if (percent < 100) return "#4ca867";
      return "#0f5132";
    }

    function getGlobalStats() {
      let memorizedAyahs = 0;
      let completedSurahs = 0;
      SURAHS.forEach(([, ayahCount], idx) => {
        const size = getMemorizedSet(idx + 1).size;
        memorizedAyahs += size;
        if (size === ayahCount) completedSurahs += 1;
      });
      const percent = Math.round((memorizedAyahs / TOTAL_AYAHS) * 1000) / 10;
      return { memorizedAyahs, completedSurahs, percent };
    }

    function render() {
      const hasName = !!state.firstName.trim();
      loginScreen.classList.toggle("hidden", hasName);
      appScreen.classList.toggle("hidden", !hasName);

      if (!hasName) return;

      const title = `${state.firstName.trim()}'s Quran Diary`;
      appTitle.textContent = title;
      const stats = getGlobalStats();
      overallHeader.textContent = `${stats.percent}% memorized`;

      statsEl.innerHTML = `
        <div class="stat"><strong>${stats.percent}%</strong><span>Overall</span></div>
        <div class="stat"><strong>${stats.memorizedAyahs}</strong><span>Ayahs memorized</span></div>
        <div class="stat"><strong>${stats.completedSurahs}/114</strong><span>Surahs complete</span></div>
      `;

      const fragment = document.createDocumentFragment();
      SURAHS.forEach(([name], idx) => {
        const pct = surahPercent(idx);
        const tile = document.createElement("button");
        tile.className = "surah-tile";
        tile.style.background = colorForPercent(pct);
        tile.innerHTML = `
          <div class="surah-top">
            <div>
              <div class="surah-name">${name}</div>
              <div class="surah-num">Surah ${idx + 1}</div>
            </div>
          </div>
          <div class="tile-actions">
            <span style="color:${pct===100 ? '#e8ffef' : '#1f3324'}">${pct}%</span>
          </div>
        `;
        tile.addEventListener("click", () => openSurahModal(idx));
        fragment.appendChild(tile);
      });

      surahGrid.innerHTML = "";
      surahGrid.appendChild(fragment);
    }

    function openSurahModal(index) {
      activeSurahIndex = index;
      const [name, ayahCount] = SURAHS[index];
      const pct = surahPercent(index);
      modalTitle.textContent = `${index + 1}. ${name}`;
      modalPercent.textContent = `${pct}% memorized`;
      markCompleteBtn.textContent = pct === 100 ? "Mark incomplete" : "Mark complete";
      ayahListEl.classList.add("hidden");
      modalFooter.classList.add("hidden");
      ayahListEl.innerHTML = "";
      surahDialog.showModal();
      diveInBtn.dataset.ayahCount = String(ayahCount);
    }

    async function loadSurahText(index) {
      const surahNumber = index + 1;
      if (surahCache[surahNumber]) return surahCache[surahNumber];
      const response = await fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}`);
      if (!response.ok) throw new Error("Could not load surah");
      const data = await response.json();
      surahCache[surahNumber] = data.data.ayahs.map((a) => ({ number: a.numberInSurah, text: a.text }));
      return surahCache[surahNumber];
    }

    async function diveIn(index) {
      ayahListEl.classList.remove("hidden");
      modalFooter.classList.remove("hidden");
      ayahListEl.innerHTML = "<p style='color:#5f6d61'>Loading ayahs…</p>";

      try {
        const ayahs = await loadSurahText(index);
        const memorized = getMemorizedSet(index + 1);

        ayahListEl.innerHTML = "";
        ayahs.forEach(({ number, text }) => {
          const row = document.createElement("label");
          row.className = "ayah-item";
          row.innerHTML = `
            <input type="checkbox" ${memorized.has(number) ? "checked" : ""} data-ayah="${number}" />
            <div>
              <div class="ayah-label">Ayah ${number}</div>
              <p class="ayah-text">${text}</p>
            </div>
          `;
          row.querySelector("input").addEventListener("change", (e) => {
            const ayahNo = Number(e.target.dataset.ayah);
            const nextSet = getMemorizedSet(index + 1);
            if (e.target.checked) nextSet.add(ayahNo);
            else nextSet.delete(ayahNo);
            setMemorizedSet(index + 1, nextSet);
            const pct = surahPercent(index);
            modalPercent.textContent = `${pct}% memorized`;
            markCompleteBtn.textContent = pct === 100 ? "Mark incomplete" : "Mark complete";
            render();
          });
          ayahListEl.appendChild(row);
        });
      } catch {
        ayahListEl.innerHTML = "<p style='color:#8d1e1e'>Could not load ayah text right now. Check internet and try again.</p>";
      }
    }

    saveNameBtn.addEventListener("click", () => {
      const name = firstNameInput.value.trim();
      if (!name) return;
      state.firstName = name;
      saveState();
      render();
    });

    firstNameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") saveNameBtn.click();
    });

    clearDataBtn.addEventListener("click", () => {
      const ok = confirm("Clear your name and all memorization progress on this device?");
      if (!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      state = { firstName: "", memorized: {} };
      render();
    });

    closeModalBtn.addEventListener("click", () => surahDialog.close());

    markCompleteBtn.addEventListener("click", () => {
      if (activeSurahIndex === null) return;
      const surahNum = activeSurahIndex + 1;
      const ayahCount = SURAHS[activeSurahIndex][1];
      const currentlyComplete = surahPercent(activeSurahIndex) === 100;
      setSurahComplete(surahNum, ayahCount, !currentlyComplete);
      openSurahModal(activeSurahIndex);
      render();
    });

    diveInBtn.addEventListener("click", () => {
      if (activeSurahIndex === null) return;
      diveIn(activeSurahIndex);
    });

    prevSurahBtn.addEventListener("click", async () => {
      if (activeSurahIndex === null) return;
      activeSurahIndex = (activeSurahIndex + 113) % 114;
      openSurahModal(activeSurahIndex);
      await diveIn(activeSurahIndex);
    });

    nextSurahBtn.addEventListener("click", async () => {
      if (activeSurahIndex === null) return;
      activeSurahIndex = (activeSurahIndex + 1) % 114;
      openSurahModal(activeSurahIndex);
      await diveIn(activeSurahIndex);
    });

    render();
  </script>
</body>
</html>
